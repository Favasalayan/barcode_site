{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">
    <h3 class="mb-4">📤 Upload Customer Order Excel</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.excel_file.label_tag }}
            {{ form.excel_file }}
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
</div>

{% endblock %}
